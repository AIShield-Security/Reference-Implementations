[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name              tail
    Path              /var/log/containers/*.log
    Parser            docker
    Tag               kube.*
    DB                /var/log/flb_kube.db
    DB.Sync           normal
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    Refresh_Interval  10
    Rotate_Wait       30
    Read_from_Head    Off
    Ignore_Older      24h
    Storage.type      filesystem

[FILTER]
    Name              kubernetes
    Match             kube.*
    Merge_Log         Off
    Keep_Log          Off

[FILTER]
    Name              grep
    Match             kube.*
    Regex             k8s.deployment aisdeployments

[OUTPUT]
    Name          http
    Match         *
    Host          audit-service
    Port          5000
    URI           /ingest
    Format        json
    Json_date_key timestamp
    Json_date_format iso8601